<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Task3</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 40px;
    }

    .switch {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background-color: grey;
      border: 3px solid black;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 20px;
      cursor: pointer;
      color: white;
      font-weight: bold;
    }

    .on {
      background-color: orange;
    }

    #light {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background-color: #555;
      margin: 30px auto;
      border: 4px solid black;
      line-height: 120px;
      color: white;
      font-weight: bold;
    }

    .light-on {
      background-color: gold !important;
      color: black !important;
      box-shadow: 0 0 25px gold;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .choice {
      display: block;
      width: 500px;
      margin: 10px auto;
    }

    .selected {
      border: 3px solid black;
      background-color: #dcedc8;
    }
    #rule-options {
  max-width: 420px;
  margin: 0 auto;
  text-align: left;
}

#rule-options label {
  display: block;
  margin: 8px 0;
  font-size: 16px;
  cursor: pointer;
}

#feedback-box {
  max-width: 420px;
  margin: 16px auto;
  padding: 14px;
  border-radius: 8px;
  font-size: 15px;
  display: none;
  text-align: left;
}
  </style>
</head>

<body>

  <h1>Task3</h1>

  <h2 id="level-title">Level 3 — Relational Rule</h2>

  <p>
    Turn switches ON or OFF, then test whether the light turns on.
  </p>

  <p>
    In this level, the rule may depend on how switches relate to each other.
  </p>

  <div>
    <div class="switch" id="N1" onclick="toggleSwitch('N1')">N1</div>
    <div class="switch" id="N2" onclick="toggleSwitch('N2')">N2</div>
    <div class="switch" id="N4" onclick="toggleSwitch('N4')">N4</div>
  </div>

  <div id="light">LIGHT</div>

  <button onclick="testLight()">Test</button>
  <button onclick="resetTrial()">Reset</button>

  <p id="result"></p>

  <hr>

  <h2>Before seeing the result, what were you thinking when you chose this test?</h2>

  <div id="strategy-choices">
    <button class="choice" onclick="chooseStrategy('explore', this)">
      I was exploring because I was not yet sure how the switches work.
    </button>

    <button class="choice" onclick="chooseStrategy('confirm', this)">
      I wanted to check whether my current idea was correct.
    </button>

    <button class="choice" onclick="chooseStrategy('compare', this)">
      I wanted to compare this test with something I had tried before.
    </button>

    <button class="choice" onclick="chooseStrategy('interaction', this)">
      I wanted to see whether multiple switches work together.
    </button>

    <button class="choice" onclick="chooseStrategy('uncertain', this)">
      I was unsure, but this seemed like a useful test to try.
    </button>
  </div>

  <hr>

<h2>What is the hidden rule?</h2>

<div id="rule-options">
  <label>
    <input type="radio" name="rule" value="N1">
    N1 alone controls the light
  </label>

  <label>
    <input type="radio" name="rule" value="N2">
    N2 alone controls the light
  </label>

  <label>
    <input type="radio" name="rule" value="N4">
    N4 alone controls the light
  </label>

  <label>
    <input type="radio" name="rule" value="N1_AND_N2">
    N1 AND N2 must both be on
  </label>

  <label>
    <input type="radio" name="rule" value="N1_OR_N2">
    N1 OR N2 being on is enough
  </label>

  <label>
    <input type="radio" name="rule" value="MATCH_N1_N2">
    The light turns on when N1 and N2 match, both on or both off
  </label>

  <label>
    <input type="radio" name="rule" value="N1_AND_N2_AND_N4">
    N1, N2, AND N4 must all be on
  </label>
</div>

<p id="ruleMessage"></p>
  
<button id="submitTrialButton" onclick="submitTrial()" disabled>
  Submit answer
</button>

<div id="feedback-box"></div>

<script>
  let switches = {
    N1: false,
    N2: false,
    N4: false
  };

  let chosenStrategy = "";
  let trialNumber = 1;
  let data = [];

  function toggleSwitch(node) {
    switches[node] = !switches[node];

    const element = document.getElementById(node);

    if (switches[node]) {
      element.classList.add("on");
    } else {
      element.classList.remove("on");
    }
  }

  function evaluateRule() {
    return switches.N1 === switches.N2;
  }

  function classifyTest() {
    const numberOn = Object.values(switches).filter(Boolean).length;

    if (numberOn === 1) {
      return "single_change";
    }

    if (numberOn >= 2) {
      return "multi_change";
    }

    return "none_on";
  }

  function testLight() {
    const lightOn = evaluateRule();
    const light = document.getElementById("light");

    if (lightOn) {
      light.classList.add("light-on");
      document.getElementById("result").innerText = "Result: The light turned ON.";
      document.getElementById("submitTrialButton").disabled = false;
    } else {
      light.classList.remove("light-on");
      document.getElementById("result").innerText = "Result: The light stayed OFF.";
      document.getElementById("submitTrialButton").disabled = false;
    }

    const trialData = {
      trial: trialNumber,
      level: 3,
      rule: "MATCH_N1_N2",
      N1: switches.N1,
      N2: switches.N2,
      N4: switches.N4,
      test_type: classifyTest(),
      reasoning: chosenStrategy,
      light_on: lightOn
    };

    data.push(trialData);
    console.log(data);

    trialNumber++;
  }

  function chooseStrategy(strategy, button) {
    chosenStrategy = strategy;

    document.querySelectorAll(".choice").forEach(btn => {
      btn.classList.remove("selected");
    });

    button.classList.add("selected");
  }

  function getSelectedRule() {
    const radios = document.getElementsByName("rule");

    for (let i = 0; i < radios.length; i++) {
      if (radios[i].checked) {
        return radios[i].value;
      }
    }

    return null;
  }

  function submitTrial() {
    const selectedRule = getSelectedRule();
    const correctRule = "MATCH_N1_N2";
    const feedbackBox = document.getElementById("feedback-box");

    if (selectedRule === null) {
      alert("Please choose a hidden rule first.");
      return;
    }

    const isCorrect = selectedRule === correctRule;

    feedbackBox.style.display = "block";

    if (isCorrect) {
      feedbackBox.style.backgroundColor = "#e8f5e9";
      feedbackBox.style.border = "1px solid #2e7d32";
      feedbackBox.innerHTML =
        "<strong>Correct.</strong> The light turns on when N1 and N2 match, both ON or both OFF.";
    } else {
      feedbackBox.style.backgroundColor = "#fdecea";
      feedbackBox.style.border = "1px solid #c62828";
      feedbackBox.innerHTML =
        "<strong>Not quite.</strong> The actual rule was: the light turns on when N1 and N2 match, both ON or both OFF.";
    }

    data.push({
      trial: trialNumber,
      level: 3,
      selectedRule: selectedRule,
      correctRule: correctRule,
      isCorrect: isCorrect,
      finalSwitchState: {
        N1: switches.N1,
        N2: switches.N2,
        N4: switches.N4
      },
      reasoning: chosenStrategy
    });

    console.log(data);
  }

  function resetTrial() {
    switches = {
      N1: false,
      N2: false,
      N4: false
    };

    ["N1", "N2", "N4"].forEach(node => {
      document.getElementById(node).classList.remove("on");
    });

    document.getElementById("light").classList.remove("light-on");
    document.getElementById("result").innerText = "";

    chosenStrategy = "";

    document.querySelectorAll(".choice").forEach(btn => {
      btn.classList.remove("selected");
    });

    document.getElementById("feedback-box").style.display = "none";
    document.getElementById("feedback-box").innerHTML = "";

    document.getElementsByName("rule").forEach(radio => {
      radio.checked = false;
    });
    document.getElementById("submitTrialButton").disabled = true;
  }
</script>

</body>
</html>
