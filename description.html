<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Before You Begin</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; padding: 40px 20px; background: #f7f7f8; color: #222; }
  .page-wrapper { max-width: 680px; margin: 0 auto; background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 32px 40px; }
  h1 { font-size: 24px; margin-top: 0; }
  p { line-height: 1.55; font-size: 15px; }
  .notice { margin: 18px 0; padding: 14px 18px; border-radius: 8px; background: #fff3e0; border: 1px solid #ef6c00; font-weight: bold; }
  .error-notice { margin: 18px 0; padding: 14px 18px; border-radius: 8px; background: #fdecea; border: 1px solid #c62828; }
  .error-notice p { margin: 0; }
  #ctaArea { margin-top: 26px; }
  button.primary { display: block; width: 100%; box-sizing: border-box; text-align: center; margin-top: 14px; padding: 12px 28px; font-size: 16px; background-color: #1565c0; color: white; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; }
  button.primary:disabled { background-color: #aaa; cursor: not-allowed; }
</style>
</head>
<body>
<div class="page-wrapper">

  <h1>Almost Ready</h1>

  <p>Please use your laptop or computer to start the task.</p>
  <p>You may spend approximately 20 minutes on the whole task.</p>
  <p>Task 1 will start on the next page &mdash; please click the button below when you're ready.</p>
  <p>Hope you will enjoy it!</p>

  <div id="ctaArea">
    <button class="primary" id="startButton" onclick="goToTask()">Start Task</button>
  </div>

</div>

<script src="session-utils.js"></script>
<script>
  window.protectStep("description");

  function goToTask() {
    window.markStepComplete("description");
    var cond = window.getSessionParam("cond");
    var target = cond === "noconcept" ? "task_noconcept.html" : "task_concept.html";
    window.location.href = target + window.buildSessionQuery();
  }

  // Participants must never be able to pick their own condition — that
  // would break random assignment. A missing cond param means the link
  // itself is wrong (or this is a bare/manual visit), so block progress
  // entirely rather than letting anyone choose. For testing, navigate
  // directly to task_concept.html or task_noconcept.html instead.
  if (!window.getSessionParam("cond")) {
    document.getElementById("ctaArea").innerHTML =
      "<div class='error-notice'><p>This link is missing required information and can't continue automatically. " +
      "Please make sure you used the exact link provided to you, or contact the researcher if the problem continues.</p></div>" +
      "<button class='primary' disabled>Start Task</button>";
  }
</script>
</body>
</html>
