<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A Few Questions About You</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; padding: 40px 20px; background: #f7f7f8; color: #222; }
  .page-wrapper { max-width: 680px; margin: 0 auto; background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 32px 40px; }
  h1 { font-size: 24px; margin-top: 0; }
  p { line-height: 1.55; font-size: 15px; }
  .field-block { margin: 22px 0; }
  .field-block label { display: block; font-weight: bold; margin-bottom: 6px; }
  .field-block input[type="text"] { width: 100%; font-size: 15px; padding: 10px; box-sizing: border-box; font-family: Arial, sans-serif; border: 1px solid #ccc; border-radius: 6px; }
  button.primary { margin-top: 26px; padding: 12px 28px; font-size: 16px; background-color: #1565c0; color: white; border: none; border-radius: 6px; cursor: pointer; }
  button.primary:disabled { background-color: #aaa; cursor: not-allowed; }
</style>
</head>
<body>
<div class="page-wrapper">

  <h1>A Few Questions About You</h1>
  <p>Please answer the following questions in your own words. These are used only to describe the overall sample in our research and will be stored anonymously.</p>

  <div class="field-block">
    <label for="ageInput">Age</label>
    <input type="text" id="ageInput" placeholder="e.g., 27">
  </div>

  <div class="field-block">
    <label for="genderInput">Gender</label>
    <input type="text" id="genderInput" placeholder="e.g., woman, man, non-binary, prefer not to say">
  </div>

  <div class="field-block">
    <label for="educationInput">Highest level of education completed</label>
    <input type="text" id="educationInput" placeholder="e.g., Bachelor's degree">
  </div>

  <button class="primary" id="continueButton" onclick="handleContinue()">Continue</button>

</div>

<script src="session-utils.js"></script>
<script>
  window.protectStep("demographic");

  function handleContinue() {
    var demographics = {
      age: document.getElementById("ageInput").value.trim(),
      gender: document.getElementById("genderInput").value.trim(),
      education: document.getElementById("educationInput").value.trim()
    };
    sessionStorage.setItem("demographics", JSON.stringify(demographics));
    window.markStepComplete("demographic");
    window.location.href = "feedback.html" + window.buildSessionQuery();
  }
</script>
</body>
</html>
