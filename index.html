<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Causal Learning Task</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 40px;
    }

    #triangle-container {
      width: 420px;
      margin: 40px auto;
    }

    .node {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background-color: grey;
      border: 3px solid black;
      cursor: pointer;
    }

    #A {
      margin: 0 auto;
    }

    #bottom-row {
      display: flex;
      justify-content: space-between;
      margin-top: 80px;
    }

    .choice {
      display: block;
      width: 420px;
      margin: 12px auto;
      padding: 12px;
      font-size: 17px;
      cursor: pointer;
    }

    #message, #answerMessage {
      font-size: 18px;
      margin-top: 20px;
    }

    #resetButton {
      margin-top: 25px;
      padding: 10px 20px;
      font-size: 17px;
      cursor: pointer;
    }
  </style>
</head>

<body>

 <h2>Example Graph</h2>

<img src="graph1.png"
     width="400"
     alt="Example causal graph">
  
  <h1>Causal Learning Task</h1>
  <p>Click one grey light to test it.</p>

  <div id="triangle-container">
    <div class="node" id="A" onclick="intervene('A')"></div>

    <div id="bottom-row">
      <div class="node" id="B" onclick="intervene('B')"></div>
      <div class="node" id="C" onclick="intervene('C')"></div>
    </div>
  </div>

  <p id="message">Choose one light.</p>

  <h2>What were you trying to test?</h2>

  <button class="choice" onclick="chooseAnswer('prediction')">
    I wanted to see what would happen after pressing this light.
  </button>

  <button class="choice" onclick="chooseAnswer('intervention')">
    I wanted to test whether this light causes another light to turn on.
  </button>

  <button class="choice" onclick="chooseAnswer('counterfactual')">
    I wanted to think about what would happen if I did not press this light.
  </button>

  <button class="choice" onclick="chooseAnswer('falsification')">
    I wanted to check whether my current guess could be wrong.
  </button>

  <button class="choice" onclick="chooseAnswer('control')">
    I wanted to compare different possible causal structures.
  </button>

  <p id="answerMessage"></p>

  <button id="resetButton" onclick="resetNodes()">Reset</button>

  <script>
    const causalGraph = {
      A: ["B", "C"],
      B: [],
      C: []
    };

    const colours = {
      A: "red",
      B: "gold",
      C: "blue"
    };

    let chosenNode = null;
    let chosenReason = null;

    function intervene(node) {
      resetNodes();

      chosenNode = node;

      document.getElementById(node).style.backgroundColor = colours[node];

      causalGraph[node].forEach(function(effect) {
        document.getElementById(effect).style.backgroundColor = colours[effect];
      });

      document.getElementById("message").innerText =
        "You tested one light.";
    }

    function chooseAnswer(answer) {
      chosenReason = answer;

      document.getElementById("answerMessage").innerText =
        "Answer recorded: " + answer;

      console.log({
        chosenNode: chosenNode,
        chosenReason: chosenReason
      });
    }

    function resetNodes() {
      ["A", "B", "C"].forEach(function(node) {
        document.getElementById(node).style.backgroundColor = "grey";
      });

      document.getElementById("message").innerText = "Choose one light.";
      document.getElementById("answerMessage").innerText = "";
    }
  </script>

</body>
</html>
