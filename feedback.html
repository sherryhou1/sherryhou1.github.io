<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Your Experience</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; padding: 40px 20px; background: #f7f7f8; color: #222; }
  .page-wrapper { max-width: 680px; margin: 0 auto; background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 32px 40px; }
  h1 { font-size: 24px; margin-top: 0; }
  p { line-height: 1.55; font-size: 15px; }
  textarea { width: 100%; min-height: 160px; font-size: 15px; padding: 10px; box-sizing: border-box; font-family: Arial, sans-serif; border: 1px solid #ccc; border-radius: 6px; resize: vertical; }
  button.primary { margin-top: 26px; padding: 12px 28px; font-size: 16px; background-color: #1565c0; color: white; border: none; border-radius: 6px; cursor: pointer; }
  button.primary:disabled { background-color: #aaa; cursor: not-allowed; }
</style>
</head>
<body>
<div class="page-wrapper">

  <h1>Your Experience</h1>
  <p>Please briefly describe how you found the task. Did you find it easy or hard? How did you make your choices?</p>

  <textarea id="feedbackInput" placeholder="Share your thoughts here..."></textarea>

  <button class="primary" id="continueButton" onclick="handleContinue()">Submit</button>

</div>

<script src="session-utils.js"></script>

<!-- Firebase: saves the final participant record to Firestore. -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  var firebaseConfig = {
    apiKey: "AIzaSyDEYtZK3iqP1Y7DeaNdutUK5Gh3OheArYE",
    authDomain: "active-intervention.firebaseapp.com",
    projectId: "active-intervention",
    storageBucket: "active-intervention.firebasestorage.app",
    messagingSenderId: "842742804191",
    appId: "1:842742804191:web:b75a700a06d0831043436a",
    measurementId: "G-43QPJPH15Q"
  };

  var app = initializeApp(firebaseConfig);
  var db = getFirestore(app);

  // Exposed for the plain script block below (which isn't a module) to call.
  window.__saveRecordToFirestore = async function (record) {
    try {
      await addDoc(collection(db, "participants"), Object.assign({}, record, {
        savedAt: serverTimestamp()
      }));
      return true;
    } catch (err) {
      console.error("Firestore save failed:", err);
      return false;
    }
  };
</script>

<script>
  window.protectStep("feedback");

  async function handleContinue() {
    var feedbackText = document.getElementById("feedbackInput").value.trim();
    sessionStorage.setItem("feedbackText", feedbackText);

    // Consolidate everything collected during this session into one record.
    var demographics = {};
    try {
      demographics = JSON.parse(sessionStorage.getItem("demographics") || "{}");
    } catch (e) {}

    var trials = [];
    try {
      trials = JSON.parse(sessionStorage.getItem("taskSessionLog") || "[]");
    } catch (e) {}

    var finalRecord = {
      prolificId: window.getSessionParam("PROLIFIC_PID") || null,
      condition: sessionStorage.getItem("taskCondition") || window.getSessionParam("cond") || null,
      consentFutureResearch: sessionStorage.getItem("consent_future_research") || null,
      consentTimestamp: sessionStorage.getItem("consent_timestamp") || null,
      demographics: demographics,
      trials: trials,
      feedback: feedbackText,
      completedAt: new Date().toISOString()
    };

    sessionStorage.setItem("finalRecord", JSON.stringify(finalRecord));
    console.log("FINAL PARTICIPANT RECORD:", finalRecord);
    window.markStepComplete("feedback");

    var btn = document.getElementById("continueButton");
    btn.disabled = true;
    btn.innerText = "Saving...";

    var saved = false;
    if (typeof window.__saveRecordToFirestore === "function") {
      saved = await window.__saveRecordToFirestore(finalRecord);
    }
    sessionStorage.setItem("dataSaved", saved ? "yes" : "no");

    window.location.href = "thankyou.html" + window.buildSessionQuery();
  }
</script>
</body>
</html>
